<p-dialog
  [visible]="visible"
  [modal]="true"
  [closable]="true"
  [draggable]="false"
  [style]="{ width: '32rem', maxWidth: '95vw' }"
  [header]="isEditMode ? 'Editar categoría' : 'Nueva categoría'"
  (onHide)="hide()"
>
  <form class="dialog-form" [formGroup]="form" (ngSubmit)="save()">
    <div class="field">
      <label for="category-name">Nombre</label>
      <input id="category-name" type="text" pInputText formControlName="name" />
      @if (form.controls.name.touched && form.controls.name.invalid) {
        <small class="p-error">El nombre es obligatorio y debe tener al menos 2 caracteres.</small>
      }
    </div>

    @if (isEditMode) {
      <div class="field field-inline">
        <p-checkbox inputId="category-active" binary="true" formControlName="isActive"></p-checkbox>
        <label for="category-active">Categoría activa</label>
      </div>
    }

    <div class="dialog-actions">
      <p-button label="Cancelar" severity="secondary" [outlined]="true" (onClick)="hide()"></p-button>
      <p-button label="Guardar" icon="pi pi-check" type="submit"></p-button>
    </div>
  </form>
</p-dialog>
