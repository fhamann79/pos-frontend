<p-dialog
  [header]="user ? 'Cambiar password: ' + user.username : 'Cambiar password'"
  [visible]="visible"
  [modal]="true"
  [style]="{ width: '30rem' }"
  [draggable]="false"
  [resizable]="false"
  (visibleChange)="visibleChange.emit($event)"
  (onHide)="hide()"
>
  <form class="password-form" [formGroup]="form" (ngSubmit)="save()">
    <div class="field-grid">
      <label for="newPassword">Nueva password</label>
      <input id="newPassword" type="password" pInputText formControlName="newPassword" />
    </div>

    <div class="field-grid">
      <label for="confirmPassword">Confirmar password</label>
      <input id="confirmPassword" type="password" pInputText formControlName="confirmPassword" />
      @if (passwordMismatch) {
        <small class="p-error">Las contraseñas no coinciden.</small>
      }
    </div>

    <div class="dialog-actions">
      <p-button type="button" label="Cancelar" severity="secondary" [outlined]="true" (onClick)="hide()"></p-button>
      <p-button type="submit" label="Guardar" icon="pi pi-check"></p-button>
    </div>
  </form>
</p-dialog>
