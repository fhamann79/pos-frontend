<div class="administration-section">
  <p-toolbar styleClass="administration-toolbar">
    <ng-template #start>
      <div class="table-search">
        <i class="pi pi-search"></i>
        <input
          pInputText
          type="text"
          [(ngModel)]="globalFilter"
          (input)="dt.filterGlobal(globalFilter, 'contains')"
          placeholder="Buscar roles"
          aria-label="Buscar roles"
        />
      </div>
    </ng-template>
    @if (canWrite) {
      <ng-template #end>
        <p-button label="Nuevo Rol" icon="pi pi-plus" (onClick)="openCreateDialog()"></p-button>
      </ng-template>
    }
  </p-toolbar>

  @if (errorMessage()) {
    <p-message severity="error" [text]="errorMessage()"></p-message>
  }

  <p-table
    #dt
    [value]="roles()"
    [loading]="loading()"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10, 25, 50]"
    [globalFilterFields]="['id', 'code', 'name', 'permissionsCount', 'isActive']"
    [sortMode]="'multiple'"
    responsiveLayout="scroll"
    [tableStyle]="{ 'min-width': '60rem' }"
  >
    <ng-template pTemplate="caption">
      <div class="caption-actions">
        <p-button
          label="Limpiar"
          icon="pi pi-filter-slash"
          severity="secondary"
          [outlined]="true"
          (onClick)="globalFilter = ''; dt.filterGlobal('', 'contains')"
        ></p-button>
      </div>
    </ng-template>

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="id">Id <p-sortIcon field="id"></p-sortIcon></th>
        <th pSortableColumn="code">Code <p-sortIcon field="code"></p-sortIcon></th>
        <th pSortableColumn="name">Name <p-sortIcon field="name"></p-sortIcon></th>
        <th pSortableColumn="isActive">Estado <p-sortIcon field="isActive"></p-sortIcon></th>
        <th pSortableColumn="permissionsCount">PermissionsCount <p-sortIcon field="permissionsCount"></p-sortIcon></th>
        <th>Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-role>
      <tr>
        <td>{{ role.id }}</td>
        <td>{{ role.code }}</td>
        <td>{{ role.name }}</td>
        <td>
          <p-tag [severity]="role.isActive ? 'success' : 'danger'" [value]="role.isActive ? 'Activo' : 'Inactivo'"></p-tag>
        </td>
        <td>{{ role.permissionsCount }}</td>
        <td>
          @if (canWrite) {
            <div class="actions">
              <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" (onClick)="openEditDialog(role)"></p-button>
              <p-button
                icon="pi pi-shield"
                severity="secondary"
                [rounded]="true"
                [text]="true"
                (onClick)="openPermissionsDialog(role)"
              ></p-button>
              <p-button
                icon="pi pi-trash"
                severity="danger"
                [rounded]="true"
                [text]="true"
                (onClick)="confirmDelete(role)"
              ></p-button>
            </div>
          } @else {
            <span class="text-muted">Solo lectura</span>
          }
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6">
          <div class="empty-state">
            <span>No hay roles registrados.</span>
            @if (canWrite) {
              <p-button label="Crear" icon="pi pi-plus" (onClick)="openCreateDialog()"></p-button>
            }
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

@if (canWrite) {
  <app-role-dialog
    [visible]="roleDialogVisible"
    [role]="selectedRole"
    (visibleChange)="onRoleDialogVisibleChange($event)"
    (submitForm)="submitRoleDialog($event)"
  ></app-role-dialog>

  <app-role-permissions-dialog
    [visible]="permissionsDialogVisible"
    [role]="selectedRole"
    (visibleChange)="onPermissionsDialogVisibleChange($event)"
    (submitForm)="submitPermissionsDialog($event)"
  ></app-role-permissions-dialog>
}
